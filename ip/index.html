<!DOCTYPE html>
<html>
<head>
    <title>Radhey Krishna Bachhar | Public IP Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        td:first-child {
            font-weight: bold;
            width: 180px;
        }
    </style>
</head>
<body>

    <h2>Public IP Information</h2>

    <button onclick="checkIP()">Check Public IP</button>

    <div id="result"></div>

    <script>
        async function checkIP() {
            const result = document.getElementById('result');

            result.style.display = 'block';
            result.innerHTML = 'Loading...';

            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                result.innerHTML = `
                    <table>
                        <tr><td>Public IP</td><td>${data.ip}</td></tr>
                        <tr><td>Country</td><td>${data.country_name}</td></tr>
                        <tr><td>Region</td><td>${data.region}</td></tr>
                        <tr><td>City</td><td>${data.city}</td></tr>
                        <tr><td>ISP</td><td>${data.org}</td></tr>
                        <tr><td>ASN</td><td>${data.asn}</td></tr>
                        <tr><td>Timezone</td><td>${data.timezone}</td></tr>
                        <tr><td>Latitude</td><td>${data.latitude}</td></tr>
                        <tr><td>Longitude</td><td>${data.longitude}</td></tr>
                    </table>
                `;
            } catch (err) {
                result.innerHTML = 'Unable to retrieve IP information.';
            }
        }
    </script>

</body>
</html>
